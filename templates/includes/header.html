<head>
    <p>
      {% if request.path != '/' %}
        <a href="{% url 'all_about_Python:index' %}">На главную</a>
        |
      {% endif %}
      {% if request.path != '/aboutabout' %}
        <a href="{% url 'about:about' %}" >О нас</a>
        |
      {% endif %}
      {% if user.is_authenticated %}
        <a href="{% url 'user:user_page' %}">Профиль</a>
        <form method="post" action="{% url 'logout' %}" >
          {% csrf_token %}
          <button type="submit" class="nav-link">Выйти</button>
        </form>
      {% else %}
        <a class="nav-link{% if view_name == 'login' %} active {% endif %}" href="{% url 'login' %}">Войти</a>
        <a class="nav-link{% if view_name == 'registration' %} active {% endif %}" href="{% url 'registration'%}">|Регистрация</a>
      {% endif %}
    </p><hr>
</head>
